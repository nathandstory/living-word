name: Bug report
description: Report a crash, broken feature, or gameplay issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install...
        2. Use...
        3. See...
    validations:
      required: true
  - type: input
    id: livingword_version
    attributes:
      label: Living Word version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft version
      placeholder: "1.21.1"
    validations:
      required: true
  - type: input
    id: neoforge_version
    attributes:
      label: NeoForge version
      placeholder: "21.1.200"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Singleplayer
        - Multiplayer client
        - Dedicated server
        - LAN
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or crash report
      description: Paste the relevant log section or attach the crash report.
      render: text
